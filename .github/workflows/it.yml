name: IT

on:
  push:
    branches:
      - main
      - DevopsEngineer
      - coder-1
      - BackendEngineer
  pull_request:
    branches:
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: itams

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: itams/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm test -- --watchAll=false

      - name: Build project
        run: npm run build
